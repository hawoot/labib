# Builds the app in the cloud so we never depend on a toolchain being present
# on the deploy host.
#
#  * web bundle  -> rebuilt and committed back into backend/app/webapp, so
#                   `git pull` on the host always serves the current UI (no
#                   `flutter build` needed there).
#  * Android APK -> uploaded as a downloadable artifact you can install on a
#                   phone. The server URL is the version-controlled kServerUrl
#                   in frontend/lib/config.dart — set it before building.
name: build

on:
  push:
    branches: [main]
    paths: ["frontend/**"]   # bundle commit touches backend/, so no loop
  pull_request:
    paths: ["frontend/**", ".github/workflows/build.yml"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Build web
        working-directory: frontend
        run: |
          flutter pub get
          flutter build web --release
      - name: Commit the rebuilt web bundle
        if: github.event_name != 'pull_request'   # on PRs, just validate the build
        run: |
          rm -rf backend/app/webapp
          cp -r frontend/build/web backend/app/webapp
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/app/webapp
          if git diff --cached --quiet; then
            echo "Web bundle unchanged."
          else
            git commit -m "chore: rebuild web bundle [skip ci]"
            git push
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: web-bundle
          path: frontend/build/web

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Add Android platform files
        # The project was scaffolded web-only (no android/ folder). Generate the
        # Android Gradle project in place; only adds platform files, leaves the
        # Dart code and pubspec untouched.
        working-directory: frontend
        run: flutter create --platforms=android --org com.labib .
      - name: Ensure INTERNET permission in the release manifest
        # Flutter only puts INTERNET in the debug/profile manifests, so a release
        # APK can't do any networking (DNS lookups fail with errno 7). Add it to
        # the main manifest so the release build can reach the server.
        working-directory: frontend
        run: |
          MAN=android/app/src/main/AndroidManifest.xml
          if ! grep -q 'android.permission.INTERNET' "$MAN"; then
            sed -i 's|<application|<uses-permission android:name="android.permission.INTERNET"/>\n    <application|' "$MAN"
          fi
          echo "----- AndroidManifest.xml -----"; cat "$MAN"
      - name: Wire in Firebase Cloud Messaging
        # `flutter create` scaffolds a fresh Android project each run, so we
        # (re)apply the FCM bits here against the version-controlled config:
        #   1. pin the applicationId to the package registered in Firebase
        #      (must match google-services.json exactly or FCM rejects tokens),
        #   2. drop the client config into android/app/, and
        #   3. apply the google-services Gradle plugin so the Firebase SDK is
        #      configured natively at build time.
        working-directory: frontend
        run: |
          set -e
          APP_GRADLE=android/app/build.gradle.kts
          SETTINGS=android/settings.gradle.kts

          # 1. Pin the package name.
          sed -i 's/applicationId = ".*"/applicationId = "com.labib.app"/' "$APP_GRADLE"

          # 2. Client config (safe to commit; it ships inside the app).
          cp firebase/google-services.json android/app/google-services.json

          # 3a. Declare the plugin (version, not applied) in settings.gradle.kts.
          if ! grep -q 'com.google.gms.google-services' "$SETTINGS"; then
            sed -i '/dev.flutter.flutter-plugin-loader/a\    id("com.google.gms.google-services") version "4.4.2" apply false' "$SETTINGS"
          fi
          # 3b. Apply it in the app module.
          if ! grep -q 'com.google.gms.google-services' "$APP_GRADLE"; then
            sed -i '/dev.flutter.flutter-gradle-plugin/a\    id("com.google.gms.google-services")' "$APP_GRADLE"
          fi

          # 4. Force compileSdk = 36 on EVERY module (app + plugins). file_picker's
          # flutter_plugin_android_lifecycle requires consumers to compile against
          # API 36, which the app-level setting alone can't give the plugin modules.
          ROOT_GRADLE=android/build.gradle.kts
          if ! grep -q 'forced compileSdk' "$ROOT_GRADLE"; then
            cat >> "$ROOT_GRADLE" <<'EOF'

// forced compileSdk: file_picker's flutter_plugin_android_lifecycle requires
// consumers to compile against Android API 36. Apply to every module, via
// reflection so it works regardless of the AGP DSL version in use.
subprojects {
    afterEvaluate {
        val android = extensions.findByName("android") ?: return@afterEvaluate
        val methods = android.javaClass.methods
        val setter = methods.firstOrNull { it.name == "setCompileSdk" && it.parameterCount == 1 }
            ?: methods.firstOrNull { it.name == "compileSdkVersion" && it.parameterCount == 1 && it.parameterTypes[0] == Integer.TYPE }
            ?: methods.firstOrNull { it.name == "setCompileSdkVersion" && it.parameterCount == 1 && it.parameterTypes[0] == Integer.TYPE }
        setter?.invoke(android, 36)
    }
}
EOF
          fi

          echo "----- settings.gradle.kts (plugins) -----"; sed -n '/plugins {/,/}/p' "$SETTINGS"
          echo "----- app/build.gradle.kts (plugins + applicationId) -----"
          sed -n '/plugins {/,/}/p' "$APP_GRADLE"; grep applicationId "$APP_GRADLE"
      - name: Build APK
        working-directory: frontend
        # Server URL is the version-controlled kServerUrl in lib/config.dart.
        run: |
          flutter pub get
          flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: frontend/build/app/outputs/flutter-apk/app-release.apk
